<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ TurboDrop - 极速文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            font-weight: 600;
            color: #333;
        }

        .pin-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .pin-code {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-section {
            margin-top: 30px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.connected {
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: #f44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }

        .log-error {
            border-left-color: #f44336;
            color: #f44336;
        }

        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        /* 雷达扫描动画 */
        .radar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 30px auto;
            display: none;
        }

        .radar-container.active {
            display: block;
        }

        .radar-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
        }

        .radar-circle-1 { width: 60px; height: 60px; }
        .radar-circle-2 { width: 120px; height: 120px; }
        .radar-circle-3 { width: 180px; height: 180px; }

        .radar-scanner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #667eea 100%);
            transform-origin: left center;
            animation: radar-scan 2s linear infinite;
        }

        @keyframes radar-scan {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .radar-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #667eea;
            animation: radar-pulse 1.5s ease-in-out infinite;
        }

        @keyframes radar-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
        }

        /* 文件拖拽区 */
        .dropzone {
            border: 3px dashed #e0e0e0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .dropzone-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .dropzone-text {
            color: #666;
            font-size: 14px;
        }

        .dropzone-text strong {
            color: #667eea;
        }

        .selected-file {
            background: #e8f0fe;
            border: 1px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .selected-file.active {
            display: block;
        }

        .selected-file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .selected-file-size {
            color: #666;
            font-size: 14px;
        }

        /* 速度图表 */
        .speed-chart {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            height: 200px;
            position: relative;
            display: none;
        }

        .speed-chart.active {
            display: block;
        }

        .speed-chart canvas {
            width: 100%;
            height: 160px;
        }

        .speed-chart-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        /* 传输历史列表 */
        .transfer-list {
            margin-top: 20px;
        }

        .transfer-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .transfer-item-info {
            flex: 1;
        }

        .transfer-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .transfer-item-status {
            font-size: 12px;
            color: #666;
        }

        .transfer-item-progress {
            width: 100px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            text-align: right;
        }

        /* 增强的 PIN 码显示 */
        .pin-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .pin-code {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .pin-timer {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* 增强的输入框 */
        .pin-input-large {
            font-size: 32px;
            letter-spacing: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="connection-status">
                <span class="status-indicator" id="wsStatus"></span>
                <span id="wsStatusText">连接中...</span>
            </div>
            <h1>⚡ TurboDrop</h1>
            <p>极速局域网文件传输 | Phase 4: Web API</p>
        </div>

        <div class="content">
            <!-- 设备信息 -->
            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">设备名称:</span>
                    <span class="info-value" id="deviceName">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">本机 IP:</span>
                    <span class="info-value" id="deviceIP">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">QUIC 端口:</span>
                    <span class="info-value" id="devicePort">加载中...</span>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('receive')">📥 接收文件</button>
                <button class="tab" onclick="switchTab('send')">📤 发送文件</button>
            </div>

            <!-- 接收模式 -->
            <div class="tab-content active" id="receiveTab">
                <!-- 雷达扫描动画 -->
                <div class="radar-container" id="radarAnimation">
                    <div class="radar-circle radar-circle-1"></div>
                    <div class="radar-circle radar-circle-2"></div>
                    <div class="radar-circle radar-circle-3"></div>
                    <div class="radar-scanner"></div>
                    <div class="radar-dot"></div>
                </div>

                <div class="pin-display" id="pinDisplay" style="display: none;">
                    <p style="margin-bottom: 10px; font-size: 18px;">📡 接收端已就绪</p>
                    <p style="font-size: 14px; opacity: 0.9;">请将此 PIN 码告诉发送端:</p>
                    <div class="pin-code" id="pinCode">------</div>
                    <p style="font-size: 14px; opacity: 0.9;">⏳ 等待发送端连接...</p>
                    <div class="pin-timer" id="pinTimer">PIN 码已生成 0 秒</div>
                </div>

                <button class="btn btn-primary" id="startReceiveBtn" onclick="startReceive()">
                    🎯 生成 PIN 码并开始接收
                </button>
            </div>

            <!-- 发送模式 -->
            <div class="tab-content" id="sendTab">
                <div class="input-group">
                    <label for="pinInput">🔢 输入接收端的 6 位 PIN 码:</label>
                    <input type="text" id="pinInput" class="pin-input-large" placeholder="------" maxlength="6" pattern="[0-9]{6}">
                </div>

                <!-- 文件拖拽区 -->
                <div class="dropzone" id="dropzone">
                    <div class="dropzone-icon">📁</div>
                    <div class="dropzone-text">
                        <strong>点击选择文件</strong> 或拖拽文件到此处<br>
                        <span style="font-size: 12px; color: #999;">支持任意类型文件</span>
                    </div>
                    <input type="file" id="fileInput" style="display: none;">
                </div>

                <!-- 已选择的文件 -->
                <div class="selected-file" id="selectedFile">
                    <div class="selected-file-name" id="selectedFileName">未选择文件</div>
                    <div class="selected-file-size" id="selectedFileSize">0 MB</div>
                </div>

                <!-- 传统文件路径输入（备用） -->
                <div class="input-group">
                    <label for="filePathInput">或者输入文件路径:</label>
                    <input type="text" id="filePathInput" placeholder="例如: ./test_file_100mb.dat">
                </div>

                <button class="btn btn-primary" id="startSendBtn" onclick="startSend()">
                    🚀 开始传输
                </button>
            </div>

            <!-- 进度显示 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-info">
                    <span>传输进度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
                </div>
                <div class="progress-info">
                    <span id="progressSpeed">速度: 0 MB/s</span>
                    <span id="progressSize">0 / 0 MB</span>
                </div>

                <!-- 实时速度图表 -->
                <div class="speed-chart" id="speedChart">
                    <div class="speed-chart-title">📈 实时传输速度</div>
                    <canvas id="speedChartCanvas"></canvas>
                </div>
            </div>

            <!-- 传输历史 -->
            <div class="transfer-list" id="transferList" style="display: none;">
                <h3 style="margin-bottom: 15px; color: #333;">📋 传输历史</h3>
            </div>

            <!-- 日志 -->
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:48080/api/v1';
        const WS_URL = 'ws://localhost:48080/api/v1/ws';
        let ws = null;
        let selectedFile = null;
        let pinStartTime = null;
        let pinTimerInterval = null;
        
        // 速度图表数据
        let speedData = [];
        let speedChart = null;
        const MAX_SPEED_POINTS = 60;

        // 初始化
        window.onload = function() {
            loadDeviceInfo();
            connectWebSocket();
            initDropzone();
            initSpeedChart();
        };

        // 初始化拖拽区
        function initDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            
            // 点击选择文件
            dropzone.addEventListener('click', () => fileInput.click());
            
            // 文件选择
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelect(e.target.files[0]);
                }
            });
            
            // 拖拽进入
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });
            
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });
            
            // 文件拖放
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                
                if (e.dataTransfer.files.length > 0) {
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });
        }

        // 处理文件选择
        function handleFileSelect(file) {
            selectedFile = file;
            
            document.getElementById('selectedFileName').textContent = file.name;
            document.getElementById('selectedFileSize').textContent = formatFileSize(file.size);
            document.getElementById('selectedFile').classList.add('active');
            document.getElementById('filePathInput').value = '';
            
            addLog(`已选择文件: ${file.name} (${formatFileSize(file.size)})`);
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        // 初始化速度图表
        function initSpeedChart() {
            const canvas = document.getElementById('speedChartCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置 canvas 实际尺寸
            canvas.width = canvas.offsetWidth;
            canvas.height = 160;
            
            speedChart = {
                canvas: canvas,
                ctx: ctx,
                draw: function() {
                    const ctx = this.ctx;
                    const width = this.canvas.width;
                    const height = this.canvas.height;
                    
                    // 清空画布
                    ctx.clearRect(0, 0, width, height);
                    
                    if (speedData.length === 0) return;
                    
                    // 找到最大速度
                    const maxSpeed = Math.max(...speedData, 10);
                    
                    // 绘制网格线
                    ctx.strokeStyle = '#e0e0e0';
                    ctx.lineWidth = 1;
                    for (let i = 0; i <= 4; i++) {
                        const y = (height / 4) * i;
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(width, y);
                        ctx.stroke();
                    }
                    
                    // 绘制速度曲线
                    if (speedData.length > 1) {
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        
                        speedData.forEach((speed, index) => {
                            const x = (width / MAX_SPEED_POINTS) * index;
                            const y = height - (speed / maxSpeed) * height;
                            
                            if (index === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        });
                        
                        ctx.stroke();
                        
                        // 填充渐变
                        ctx.lineTo(width, height);
                        ctx.lineTo(0, height);
                        ctx.closePath();
                        
                        const gradient = ctx.createLinearGradient(0, 0, 0, height);
                        gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
                        gradient.addColorStop(1, 'rgba(102, 126, 234, 0.0)');
                        ctx.fillStyle = gradient;
                        ctx.fill();
                    }
                    
                    // 绘制当前速度标签
                    if (speedData.length > 0) {
                        const currentSpeed = speedData[speedData.length - 1];
                        ctx.fillStyle = '#667eea';
                        ctx.font = 'bold 14px Arial';
                        ctx.fillText(`${currentSpeed.toFixed(1)} MB/s`, 10, 20);
                    }
                }
            };
        }

        // 更新速度图表
        function updateSpeedChart(speedMBps) {
            speedData.push(speedMBps);
            
            // 保持最多 60 个数据点
            if (speedData.length > MAX_SPEED_POINTS) {
                speedData.shift();
            }
            
            if (speedChart) {
                speedChart.draw();
            }
        }

        // 加载设备信息
        async function loadDeviceInfo() {
            try {
                const response = await fetch(`${API_BASE}/info`);
                const data = await response.json();
                document.getElementById('deviceName').textContent = data.name;
                document.getElementById('deviceIP').textContent = data.ip;
                document.getElementById('devicePort').textContent = data.quic_port;
            } catch (error) {
                addLog('加载设备信息失败: ' + error.message, true);
            }
        }

        // WebSocket 连接
        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = function() {
                updateWSStatus(true);
                addLog('WebSocket 连接成功');
            };

            ws.onclose = function() {
                updateWSStatus(false);
                addLog('WebSocket 连接断开，5秒后重连...', true);
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = function(error) {
                addLog('WebSocket 错误: ' + error, true);
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                handleWSMessage(msg);
            };
        }

        // 处理 WebSocket 消息
        function handleWSMessage(msg) {
            switch(msg.type) {
                case 'log':
                    addLog(msg.data.message);
                    break;
                case 'error':
                    addLog('错误: ' + msg.data.error, true);
                    break;
                case 'pin_generated':
                    document.getElementById('pinCode').textContent = msg.data.pin;
                    document.getElementById('pinDisplay').style.display = 'block';
                    document.getElementById('radarAnimation').classList.add('active');
                    addLog('PIN 码已生成: ' + msg.data.pin);
                    startPinTimer();
                    break;
                case 'device_found':
                    addLog('✅ 发现设备: ' + msg.data.device_name + ' (' + msg.data.device_ip + ')');
                    document.getElementById('radarAnimation').classList.remove('active');
                    break;
                case 'transfer_start':
                    document.getElementById('progressSection').classList.add('active');
                    document.getElementById('speedChart').classList.add('active');
                    addLog('开始传输文件: ' + msg.data.filename);
                    speedData = [];
                    break;
                case 'progress':
                    updateProgress(msg.data);
                    updateSpeedChart(msg.data.speed_mbps);
                    break;
                case 'transfer_done':
                    addLog('✅ ' + msg.data.message);
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressBar').textContent = '100%';
                    stopPinTimer();
                    addToTransferHistory(msg.data);
                    break;
            }
        }

        // PIN 码计时器
        function startPinTimer() {
            pinStartTime = Date.now();
            pinTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - pinStartTime) / 1000);
                document.getElementById('pinTimer').textContent = `PIN 码已生成 ${elapsed} 秒`;
            }, 1000);
        }

        function stopPinTimer() {
            if (pinTimerInterval) {
                clearInterval(pinTimerInterval);
                pinTimerInterval = null;
            }
        }

        // 更新进度
        function updateProgress(data) {
            const percent = data.percent.toFixed(1);
            const speed = data.speed_mbps.toFixed(2);
            const transferred = (data.transferred / (1024 * 1024)).toFixed(2);
            const total = (data.total / (1024 * 1024)).toFixed(2);

            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressSpeed').textContent = '速度: ' + speed + ' MB/s';
            document.getElementById('progressSize').textContent = transferred + ' / ' + total + ' MB';
        }

        // 添加到传输历史
        function addToTransferHistory(data) {
            const listContainer = document.getElementById('transferList');
            listContainer.style.display = 'block';
            
            const item = document.createElement('div');
            item.className = 'transfer-item';
            item.innerHTML = `
                <div class="transfer-item-info">
                    <div class="transfer-item-name">📄 ${data.filename || '未知文件'}</div>
                    <div class="transfer-item-status">✅ 传输成功 - ${new Date().toLocaleTimeString()}</div>
                </div>
                <div class="transfer-item-progress">100%</div>
            `;
            
            listContainer.appendChild(item);
        }

        // 更新 WebSocket 状态
        function updateWSStatus(connected) {
            const indicator = document.getElementById('wsStatus');
            const text = document.getElementById('wsStatusText');
            if (connected) {
                indicator.classList.add('connected');
                indicator.classList.remove('disconnected');
                text.textContent = '已连接';
            } else {
                indicator.classList.add('disconnected');
                indicator.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        // 添加日志
        function addLog(message, isError = false) {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' log-error' : '');
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 切换标签页
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if (tab === 'receive') {
                tabs[0].classList.add('active');
                contents[0].classList.add('active');
            } else {
                tabs[1].classList.add('active');
                contents[1].classList.add('active');
            }
        }

        // 开始接收
        async function startReceive() {
            const btn = document.getElementById('startReceiveBtn');
            btn.disabled = true;
            btn.textContent = '启动中...';

            try {
                const response = await fetch(`${API_BASE}/receive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const data = await response.json();
                if (data.success) {
                    addLog('接收端已启动');
                    btn.textContent = '✅ 接收端运行中';
                } else {
                    throw new Error(data.message || '启动失败');
                }
            } catch (error) {
                addLog('启动失败: ' + error.message, true);
                btn.disabled = false;
                btn.textContent = '🎯 生成 PIN 码并开始接收';
            }
        }

        // 开始发送
        async function startSend() {
            const pin = document.getElementById('pinInput').value;
            let filepath = document.getElementById('filePathInput').value;

            if (pin.length !== 6) {
                alert('请输入 6 位 PIN 码');
                return;
            }

            // 优先使用选中的文件
            if (selectedFile) {
                // TODO: 实现文件上传到服务器
                // 目前仅支持服务器本地文件路径
                alert('拖拽文件功能需要服务器支持文件上传，当前请使用文件路径');
                return;
            }

            if (!filepath) {
                alert('请选择文件或输入文件路径');
                return;
            }

            const btn = document.getElementById('startSendBtn');
            btn.disabled = true;
            btn.textContent = '启动中...';

            // 显示雷达动画
            switchTab('send');
            document.getElementById('radarAnimation').classList.add('active');

            try {
                const response = await fetch(`${API_BASE}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, filepath })
                });

                const data = await response.json();
                if (data.success) {
                    addLog('发送端已启动');
                    btn.textContent = '✅ 传输中...';
                } else {
                    throw new Error(data.message || '启动失败');
                }
            } catch (error) {
                addLog('启动失败: ' + error.message, true);
                btn.disabled = false;
                btn.textContent = '🚀 开始传输';
                document.getElementById('radarAnimation').classList.remove('active');
            }
        }
    </script>
</body>
</html>
